// release-extensions.gradle
// Builds signed release APKs, collects APKs and icons to builds/ at the root.
//
// Usage:
//   ./gradlew releaseExtensions -Pexts=all
//   ./gradlew releaseExtensions -Pexts=libread
//   ./gradlew releaseExtensions -Pexts=libread,empirenovel
//   ./gradlew releaseExtensions -Pexts=all -PbumpVersion
//   ./gradlew releaseExtensions -Pexts=libread,empirenovel -PbumpVersion

import java.nio.file.Files
import java.nio.file.StandardCopyOption

def ALL_EXTENSIONS = [
    'boxnovel', 'empirenovel', 'fanmtl', 'jpmtl', 'libread',
    'lnmtl', 'novelbin', 'novelbuddy', 'novelfull', 'purrfiction',
    'ranobes', 'royalroad', 'scribblehub', 'wuxiaworldsite'
]

// Icon search order: prefer higher-res foreground, fall back to full launcher icon.
// Each density is checked for .png first, then .webp.
def ICON_SEARCH_PATHS = [
    'mipmap-xxxhdpi/ic_launcher_foreground.png',
    'mipmap-xxxhdpi/ic_launcher_foreground.webp',
    'mipmap-xxhdpi/ic_launcher_foreground.png',
    'mipmap-xxhdpi/ic_launcher_foreground.webp',
    'mipmap-xhdpi/ic_launcher_foreground.png',
    'mipmap-xhdpi/ic_launcher_foreground.webp',
    'mipmap-hdpi/ic_launcher_foreground.png',
    'mipmap-hdpi/ic_launcher_foreground.webp',
    'mipmap-mdpi/ic_launcher_foreground.png',
    'mipmap-mdpi/ic_launcher_foreground.webp',
    'mipmap-xxxhdpi/ic_launcher.png',
    'mipmap-xxxhdpi/ic_launcher.webp',
    'mipmap-xxhdpi/ic_launcher.png',
    'mipmap-xxhdpi/ic_launcher.webp',
    'mipmap-xhdpi/ic_launcher.png',
    'mipmap-xhdpi/ic_launcher.webp',
    'mipmap-hdpi/ic_launcher.png',
    'mipmap-hdpi/ic_launcher.webp',
    'mipmap-mdpi/ic_launcher.png',
    'mipmap-mdpi/ic_launcher.webp',
]

// Runs a command, streams its output, and throws on non-zero exit.
def runCommand = { List cmd, File workDir ->
    def proc = new ProcessBuilder(cmd.collect { it.toString() })
        .directory(workDir)
        .redirectErrorStream(true)
        .start()
    proc.inputStream.eachLine { println "    $it" }
    def exit = proc.waitFor()
    if (exit != 0) throw new GradleException("Command failed (exit $exit): ${cmd.join(' ')}")
}

tasks.register('releaseExtensions') {
    group = 'release'
    description = 'Builds release APKs and collects APKs + icons to builds/. ' +
                  'Use -Pexts=all|ext1,ext2 and optionally -PbumpVersion to increment version codes.'

    doLast {
        def extensionsParam = (project.findProperty('exts') ?: 'all').toString().trim()
        def shouldBump      = project.hasProperty('bumpVersion')

        def targetExtensions = (extensionsParam == 'all')
            ? new ArrayList<>(ALL_EXTENSIONS)
            : extensionsParam.split(',').collect { it.trim() }.findAll { it }

        // Validate names
        def invalid = targetExtensions.findAll { !ALL_EXTENSIONS.contains(it) }
        if (invalid) {
            throw new GradleException(
                "Unknown extension(s): ${invalid.join(', ')}\n" +
                "Available: ${ALL_EXTENSIONS.join(', ')}"
            )
        }

        println ""
        println "=" * 62
        println " Release Extensions : ${targetExtensions.join(', ')}"
        println " Bump version codes : ${shouldBump}"
        println "=" * 62

        def stepCount = shouldBump ? 4 : 3
        def step = 0

        // ── Step: Bump version codes (optional) ───────────────────────
        if (shouldBump) {
            step++
            println "\n[${step}/${stepCount}] Bumping version codes..."
            targetExtensions.each { ext ->
                def buildFile = file("extensions/individual/en/${ext}/build.gradle")
                if (!buildFile.exists()) {
                    throw new GradleException("Build file not found for extension: ${ext}")
                }
                def content = buildFile.text
                def matcher = (content =~ /extVersionCode\s*=\s*(\d+)/)
                if (!matcher) {
                    throw new GradleException("Could not find extVersionCode in ${buildFile}")
                }
                def oldVer = matcher[0][1].toInteger()
                def newVer = oldVer + 1
                buildFile.text = content.replaceFirst(/extVersionCode\s*=\s*\d+/, "extVersionCode = ${newVer}")
                println "  ${ext.padRight(20)} ${oldVer} → ${newVer}"
            }
        }

        // ── Step: Build release APKs via a fresh Gradle invocation ────
        // A new invocation is required so that any bumped version codes
        // are picked up during project evaluation.
        step++
        println "\n[${step}/${stepCount}] Building release APKs..."
        def moduleTasks = targetExtensions.collect { ":extensions:individual:en:${it}:assembleRelease" }

        def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
        def gradleWrapper = new File(rootDir, isWindows ? 'gradlew.bat' : 'gradlew').absolutePath
        def buildCmd = new ArrayList<String>()
        if (isWindows) { buildCmd.addAll(['cmd', '/c', gradleWrapper]) } else { buildCmd.add(gradleWrapper) }
        buildCmd.addAll(['--no-daemon', '--parallel'])
        buildCmd.addAll(moduleTasks)

        runCommand(buildCmd, rootDir)

        def apkDir  = file("builds/apk")
        def iconDir = file("builds/icon")
        apkDir.mkdirs()
        iconDir.mkdirs()

        // ── Step: Collect APKs ────────────────────────────────────────
        step++
        println "\n[${step}/${stepCount}] Collecting APKs to builds/apk/..."
        def apksCopied = 0
        // ext → base name (e.g. "novellibrary-en.libread-v1.0.2"), used for icon naming
        def baseNames = [:]

        targetExtensions.each { ext ->
            def releaseDir = file("extensions/individual/en/${ext}/build/outputs/apk/release")
            if (releaseDir.exists()) {
                releaseDir.listFiles()?.each { apkFile ->
                    if (apkFile.name.endsWith('.apk')) {
                        // novellibrary-en.boxnovel-v1.0.5-release.apk → novellibrary-en.boxnovel-v1.0.5.apk
                        def destName = apkFile.name.replace('-release.apk', '.apk')
                        Files.copy(apkFile.toPath(), new File(apkDir, destName).toPath(),
                            StandardCopyOption.REPLACE_EXISTING)
                        println "  ✓ ${destName}"
                        baseNames[ext] = destName.replace('.apk', '')
                        apksCopied++
                    }
                }
            } else {
                println "  ⚠ No release output found for: ${ext}"
            }
        }

        // ── Step: Collect icons (converting .webp → .png) ────────────
        step++
        println "\n[${step}/${stepCount}] Collecting icons to builds/icon/..."
        def iconsCopied = 0

        targetExtensions.each { ext ->
            def baseName = baseNames[ext]
            if (!baseName) {
                println "  ⚠ Skipping icon for ${ext} (no APK was collected)"
                return
            }
            def resDir = file("extensions/individual/en/${ext}/res")
            def found = ICON_SEARCH_PATHS.find { iconPath ->
                def iconFile = new File(resDir, iconPath)
                if (!iconFile.exists()) return false

                def destFile = new File(iconDir, "${baseName}.png")
                if (iconFile.name.endsWith('.webp')) {
                    // Use PowerShell WPF/WIC to convert WebP → PNG (Windows 11 native WebP codec)
                    def src = iconFile.absolutePath.replace('\\', '/')
                    def dst = destFile.absolutePath.replace('\\', '/')
                    runCommand([
                        'powershell', '-NonInteractive', '-NoProfile', '-Command',
                        "Add-Type -AssemblyName PresentationCore; " +
                        "\$s=[IO.File]::OpenRead('${src}'); " +
                        "\$dec=[Windows.Media.Imaging.BitmapDecoder]::Create(\$s,'None','OnLoad'); " +
                        "\$enc=New-Object Windows.Media.Imaging.PngBitmapEncoder; " +
                        "\$enc.Frames.Add(\$dec.Frames[0]); " +
                        "\$o=[IO.File]::Open('${dst}','Create'); " +
                        "\$enc.Save(\$o); \$o.Close(); \$s.Close()"
                    ], rootDir)
                } else {
                    Files.copy(iconFile.toPath(), destFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
                }
                println "  ✓ ${destFile.name}"
                iconsCopied++
                return true
            }
            if (!found) {
                println "  ⚠ No icon found for: ${ext}"
            }
        }

        println ""
        println "=" * 62
        println " Done!"
        println "   APKs  (${apksCopied})  → ${apkDir.canonicalPath}"
        println "   Icons (${iconsCopied}) → ${iconDir.canonicalPath}"
        println "=" * 62
        println ""
    }
}
